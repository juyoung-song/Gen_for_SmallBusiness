<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#fff8ef]/80 dark:bg-stone-950/80 backdrop-blur-xl flex justify-between items-center px-6 py-4">
<button class="material-symbols-outlined text-[#954a25] dark:text-[#f1e7d2] hover:bg-[#f1e7d2]/50 p-2 rounded-full transition-colors active:scale-95 duration-200" data-icon="arrow_back" id="step3-back" type="button">arrow_back</button>
<div class="brand-lockup">
<img alt="Brewgram 로고" class="brand-mark" src="../brand-badge.png"/>
<span class="brand-wordmark">Brewgram</span>
</div>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="w-full max-w-2xl px-6 pt-32 pb-32 flex flex-col gap-10">
<!-- Progress Indicator -->
<section class="flex flex-col gap-3">
<div class="flex justify-between items-center text-sm font-medium text-on-surface-variant">
<span class="font-headline tracking-widest uppercase film-step">STEP 02/04</span>
<span>75%</span>
</div>
<div class="h-1.5 w-full bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full w-3/4"></div>
</div>
</section>
<!-- Hero Content -->
<section class="flex flex-col gap-4">
<h2 class="text-3xl md:text-4xl font-headline font-bold text-on-surface leading-tight tracking-tight film-headline">
                우리 가게를 조금 더 알려주세요
            </h2>
<p class="text-lg text-on-surface-variant leading-relaxed warm-copy">
                어떤 손님이 오시는지, 어떤 분위기를 좋아하는지 자유롭게 적어주세요.
            </p>
</section>
<!-- Asymmetric Visual Element -->
<section class="relative w-full h-48 rounded-xl overflow-hidden mb-2 editorial-photo">
<img alt="bakery interior" class="w-full h-full object-cover brightness-[1.02] saturate-110" data-alt="warm sunlit bakery interior with wooden furniture, artisan breads on display, and soft morning light casting gentle shadows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD9xaJz1vw-7zfOVCO-VOHPG7GsmvUD9yhcVPmJjm3l7g6oFOd21rRfvVosBqrZNX3k08MG4R2PvAFL-1GK4PhZYmyEVnWxtFNzQbpJJv4GIsZ6jBTjsr35TfCWFG7UgnV2hUTs11XWnHwS3qCdoobepBCCrexG_jSlipl61SN7AlZp6veIAFChKtzpBC9YOUM_3vOO9AEyko6OJ4zuJoQhozZASe6R2Ulv9qGGfH8EC2FVc9AEsMM5FOFHUYxhCtjY94FE_4UOBR0"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface/60 to-transparent"></div>
<div class="absolute bottom-4 left-6 flex items-center gap-2 bg-surface-container-lowest/90 backdrop-blur px-4 py-2 rounded-full editorial-shadow">
<span class="material-symbols-outlined text-tertiary scale-75" data-icon="auto_awesome">auto_awesome</span>
<span class="text-xs font-semibold text-on-surface tracking-tight">브랜드 이야기 만들기</span>
</div>
</section>
<!-- Input Section -->
<section class="flex flex-col gap-4">
<div class="flex justify-between items-end px-2">
<label class="text-sm font-bold text-on-surface-variant" for="brand-description">브랜드 설명</label>
<span class="text-xs font-semibold text-on-surface-variant">안 적어도 시작할 수 있어요</span>
</div>
<div class="relative group">
<textarea class="w-full bg-surface-container-highest border-none rounded-xl p-6 text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/30 transition-all resize-none leading-relaxed editorial-shadow" id="brand-description" placeholder="예: 매일 아침 갓 구운 고소한 빵 냄새가 가득한 골목길 작은 베이커리입니다. 유기농 밀가루를 사용해 아이들도 안심하고 먹을 수 있는 건강한 간식을 만듭니다. 아늑한 원목 인테리어와 클래식 음악이 흐르는 따뜻한 분위기에서 잠시 쉬어가세요." rows="6"></textarea>
<!-- Stylized Corner Accent -->
<div class="absolute -bottom-2 -right-2 w-12 h-12 dashed-border opacity-20 pointer-events-none"></div>
</div>

<span class="material-symbols-outlined text-primary scale-75 mt-0.5" data-icon="info">info</span>
<p class="text-xs text-on-surface-variant/80 leading-normal">

                </p>
</div>
</section>

</button>
