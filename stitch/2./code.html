<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta content="#ff6b57" name="theme-color"/>
<meta content="yes" name="apple-mobile-web-app-capable"/>
<meta content="default" name="apple-mobile-web-app-status-bar-style"/>
<title>Brewgram - 스타일 레퍼런스</title>
<link href="/stitch/manifest.webmanifest" rel="manifest"/>
<link href="/stitch/icons/icon.svg" rel="icon" type="image/svg+xml"/>
<link href="/stitch/icons/apple-touch-icon.png" rel="apple-touch-icon"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="../shared.css" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "on-tertiary-fixed": "#371800",
                "primary-fixed": "#ffae8a",
                "on-secondary-fixed-variant": "#476400",
                "on-tertiary-fixed-variant": "#663100",
                "on-background": "#373222",
                "surface-container-lowest": "#ffffff",
                "inverse-surface": "#110e06",
                "surface-container-low": "#fbf3e1",
                "surface-container": "#f6edda",
                "primary-dim": "#863e1b",
                "on-surface": "#373222",
                "secondary-dim": "#405b00",
                "surface": "#fff8ef",
                "secondary-container": "#c8f17a",
                "on-primary-fixed-variant": "#75310e",
                "on-primary-fixed": "#4a1800",
                "surface-dim": "#e4d9bf",
                "surface-container-high": "#f1e7d2",
                "secondary-fixed-dim": "#bae26e",
                "tertiary-fixed": "#ffa35d",
                "outline": "#827a66",
                "on-primary": "#fff7f5",
                "secondary-fixed": "#c8f17a",
                "on-primary-container": "#692906",
                "outline-variant": "#bab19b",
                "inverse-on-surface": "#a29c8f",
                "surface-container-highest": "#ece2ca",
                "tertiary-fixed-dim": "#fc8f34",
                "primary-fixed-dim": "#fb9b70",
                "secondary": "#4a6800",
                "on-surface-variant": "#655f4c",
                "on-error-container": "#65000b",
                "on-secondary-container": "#3f5a00",
                "tertiary-container": "#ffa35d",
                "primary": "#954a25",
                "on-tertiary": "#fff7f4",
                "tertiary-dim": "#834100",
                "surface-tint": "#954a25",
                "surface-bright": "#fff8ef",
                "error-dim": "#70030f",
                "on-error": "#fff7f6",
                "surface-variant": "#ece2ca",
                "inverse-primary": "#f8986d",
                "background": "#fff8ef",
                "error": "#ac3434",
                "tertiary": "#954b00",
                "on-secondary": "#f0ffce",
                "on-tertiary-container": "#592a00",
                "primary-container": "#ffae8a",
                "on-secondary-fixed": "#304600",
                "error-container": "#f56965"
            },
            "borderRadius": {
                "DEFAULT": "1rem",
                "lg": "2rem",
                "xl": "3rem",
                "full": "9999px"
            },
            "fontFamily": {
                "headline": ["Plus Jakarta Sans", "Pretendard", "sans-serif"],
                "body": ["Be Vietnam Pro", "Pretendard", "sans-serif"],
                "label": ["Be Vietnam Pro", "Pretendard", "sans-serif"]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Be Vietnam Pro', 'Pretendard', sans-serif;
            background-color: #fff8ef;
            color: #373222;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-start overflow-x-hidden" data-stitch-page="onboarding-2">
<!-- Top AppBar (Navigation Shell Suppressed for Onboarding Flow) -->
<header class="fixed top-0 w-full z-50 bg-[#fff8ef]/80 dark:bg-stone-950/80 backdrop-blur-xl">
<div class="max-w-2xl mx-auto px-6 py-4 flex items-center justify-between">
<button class="text-[#954a25] dark:text-[#f1e7d2] hover:bg-[#f1e7d2]/50 active:scale-95 transition-all p-2 rounded-full" id="step2-back" type="button">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex flex-col items-center gap-1">
<div class="brand-lockup">
<img alt="Brewgram 로고" class="brand-mark" src="../brand-badge.png"/>
<span class="brand-wordmark">Brewgram</span>
</div>
<div class="flex gap-1.5">
<div class="w-1.5 h-1.5 rounded-full bg-primary-container"></div>
<div class="w-6 h-1.5 rounded-full bg-primary"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary-container"></div>
</div>
<span class="font-label text-[10px] font-bold text-primary tracking-widest uppercase film-step">STEP 03/04</span>
</div>
<div class="w-10"></div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-2xl px-6 pt-32 pb-32 flex flex-col flex-grow">
<!-- Headline Section -->
<section class="mb-8">
<h1 class="font-headline font-bold text-3xl text-on-surface tracking-tight mb-3 film-headline">원하는 스타일을<br/>알려주세요</h1>
<p class="font-body text-on-surface-variant text-base leading-relaxed warm-copy">
                인스타그램 링크를 주면 AI가 사장님의 취향을 더 잘 이해해요.
            </p>
</section>
<!-- Instagram Link Input -->
<section class="mb-10">
<div class="flex items-center justify-between mb-3 px-2">
<label class="block font-label text-sm font-semibold text-on-surface-variant">인스타그램 주소</label>
<span class="text-[11px] font-bold text-primary bg-primary-container/35 px-3 py-1 rounded-full">선택</span>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-5 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl">link</span>
</div>
<input class="w-full h-16 pl-14 pr-6 bg-surface-container-highest border-none rounded-xl text-on-surface focus:ring-2 focus:ring-primary/30 transition-all placeholder:text-outline/60 font-body" id="instagram-url-input" placeholder="https://instagram.com/cafe_name" type="text"/>
</div>
<p class="mt-3 px-2 text-xs leading-relaxed text-on-surface-variant">좋아하는 스타일의 인스타 계정이 있다면 링크 하나만 넣어주세요.</p>
</section>
<!-- Footer Tip Box -->
<div class="bg-surface-container-high/50 p-5 rounded-lg flex gap-4 items-start mb-8 paper-card">
<span class="material-symbols-outlined text-tertiary-fixed-dim text-xl">lightbulb</span>
<p class="font-body text-sm text-on-surface-variant leading-relaxed">
                링크를 모른다면 지금은 건너뛰고, 나중에 메인 화면에서 추가할 수도 있어요.
            </p>
</div>
<section class="pt-2 pb-4">
<div class="hidden" id="onboarding-status"></div>
</section>
<section class="hidden mb-12" id="onboarding-analysis-panel">
<div class="bg-surface-container-lowest rounded-[28px] px-6 py-6 editorial-shadow border border-outline-variant/40 flex flex-col gap-4">
<div class="flex items-center justify-between gap-3">
<div>
<p class="text-xs font-semibold tracking-[0.24em] uppercase text-primary">AI Brand Analysis</p>
<h3 class="mt-2 text-2xl font-headline font-bold text-on-surface">이렇게 브랜드를 이해했어요</h3>
</div>
<span class="inline-flex items-center rounded-full bg-primary-container px-3 py-1 text-xs font-semibold text-on-primary-container" id="onboarding-analysis-badge">AI 분석 완료</span>
</div>
<p class="text-sm leading-relaxed text-on-surface-variant">
                    아래 문구는 이후 카피와 이미지 생성의 기준이 됩니다. 마음에 들면 다음 단계로 넘어가세요.
                </p>
<div class="rounded-[24px] bg-surface-container-high px-5 py-5">
<p class="whitespace-pre-wrap text-[15px] leading-7 text-on-surface" id="onboarding-analysis-text"></p>
</div>
</div>
</section>
</main>
<!-- Fixed Footer Action Area -->
<footer class="fixed bottom-0 left-0 w-full bg-surface/90 backdrop-blur-xl px-8 pb-10 pt-6 z-50">
<div class="max-w-2xl mx-auto flex gap-3">
<button class="flex-[1] h-14 rounded-full font-label font-bold text-on-surface-variant hover:bg-surface-container-high transition-colors active:scale-95" id="step2-skip" type="button">
            건너뛰기
        </button>
<button class="flex-[2] h-14 bg-gradient-to-r from-primary to-primary-dim rounded-full font-label font-bold text-on-primary shadow-lg shadow-primary/20 flex items-center justify-center gap-2 active:scale-95 transition-all warm-button" id="step2-next" type="button">
            다음
            <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</div>
</footer>
<script src="../shared.js"></script>
</body></html>
