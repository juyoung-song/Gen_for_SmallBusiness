<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta content="#ff6b57" name="theme-color"/>
<meta content="yes" name="apple-mobile-web-app-capable"/>
<meta content="default" name="apple-mobile-web-app-status-bar-style"/>
<title>Brewgram - 브랜드 세팅</title>
<link href="/stitch/manifest.webmanifest" rel="manifest"/>
<link href="/stitch/icons/icon.svg" rel="icon" type="image/svg+xml"/>
<link href="/stitch/icons/apple-touch-icon.png" rel="apple-touch-icon"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="../shared.css" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-fixed": "#371800",
                    "primary-fixed": "#ffae8a",
                    "on-secondary-fixed-variant": "#476400",
                    "on-tertiary-fixed-variant": "#663100",
                    "on-background": "#373222",
                    "surface-container-lowest": "#ffffff",
                    "inverse-surface": "#110e06",
                    "surface-container-low": "#fbf3e1",
                    "surface-container": "#f6edda",
                    "primary-dim": "#863e1b",
                    "on-surface": "#373222",
                    "secondary-dim": "#405b00",
                    "surface": "#fff8ef",
                    "secondary-container": "#c8f17a",
                    "on-primary-fixed-variant": "#75310e",
                    "on-primary-fixed": "#4a1800",
                    "surface-dim": "#e4d9bf",
                    "surface-container-high": "#f1e7d2",
                    "secondary-fixed-dim": "#bae26e",
                    "tertiary-fixed": "#ffa35d",
                    "outline": "#827a66",
                    "on-primary": "#fff7f5",
                    "secondary-fixed": "#c8f17a",
                    "on-primary-container": "#692906",
                    "outline-variant": "#bab19b",
                    "inverse-on-surface": "#a29c8f",
                    "surface-container-highest": "#ece2ca",
                    "tertiary-fixed-dim": "#fc8f34",
                    "primary-fixed-dim": "#fb9b70",
                    "secondary": "#4a6800",
                    "on-surface-variant": "#655f4c",
                    "on-error-container": "#65000b",
                    "on-secondary-container": "#3f5a00",
                    "tertiary-container": "#ffa35d",
                    "primary": "#954a25",
                    "on-tertiary": "#fff7f4",
                    "tertiary-dim": "#834100",
                    "surface-tint": "#954a25",
                    "surface-bright": "#fff8ef",
                    "error-dim": "#70030f",
                    "on-error": "#fff7f6",
                    "surface-variant": "#ece2ca",
                    "inverse-primary": "#f8986d",
                    "background": "#fff8ef",
                    "error": "#ac3434",
                    "tertiary": "#954b00",
                    "on-secondary": "#f0ffce",
                    "on-tertiary-container": "#592a00",
                    "primary-container": "#ffae8a",
                    "on-secondary-fixed": "#304600",
                    "error-container": "#f56965"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Be Vietnam Pro"],
                    "label": ["Be Vietnam Pro"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background-color: #fff8ef;
            color: #373222;
        }
        .headline-font {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .custom-upload-dash {
            background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='48' ry='48' stroke='%23bab19b' stroke-width='2' stroke-dasharray='8%2c 4' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");
            border-radius: 3rem;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col" data-stitch-page="onboarding-1">
<!-- Top Navigation Anchor (Manual suppression check: Onboarding page hide nav, but show TopAppBar per hierarchy rules for context) -->
<header class="bg-[#fff8ef]/80 dark:bg-stone-950/80 backdrop-blur-xl fixed top-0 w-full z-50">
<div class="flex justify-between items-center w-full px-6 py-4">
<button class="text-[#954a25] dark:text-[#f1e7d2] hover:bg-[#f1e7d2]/50 active:scale-95 transition-all p-2 rounded-full" id="step1-back" type="button">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="brand-lockup">
<img alt="Brewgram 로고" class="brand-mark" src="../brand-badge.png"/>
<span class="brand-wordmark">Brewgram</span>
</div>
<div class="w-10"></div> <!-- Spacer for balance -->
</div>
</header>
<main class="flex-grow pt-24 pb-32 px-6 max-w-2xl mx-auto w-full">
<!-- Progress Header -->
<div class="mb-12">
<div class="flex justify-between items-end mb-3">
<span class="film-step">STEP 01/04</span>
<span class="text-on-surface-variant font-medium">25% 완료</span>
</div>
<div class="h-1.5 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary w-1/4 rounded-full"></div>
</div>
</div>
<!-- Hero Content -->
<section class="mb-12">
<h2 class="text-4xl font-bold headline-font text-on-surface tracking-tight mb-4 film-headline">브랜드 세팅을 시작할게요</h2>
<p class="text-on-surface-variant text-lg leading-relaxed warm-copy">고객들에게 기억될 당신만의 특별한 공간을 정의해주세요.</p>
</section>
<!-- Form Layout: Asymmetric Bento Style -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<!-- Brand Name Input Card -->
<div class="md:col-span-2 bg-surface-container-lowest p-8 rounded-xl shadow-[0_12px_32px_rgba(55,50,34,0.04)] paper-card">
<label class="block text-on-surface font-bold text-lg mb-4">브랜드 이름</label>
<input class="w-full border-none rounded-xl px-6 py-5 text-xl text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/30 transition-all outline-none bg-[linear-gradient(135deg,rgba(255,178,102,0.16),rgba(255,106,136,0.07))]" id="brand-name-input" placeholder="마음이 쉬어가는 베이커리" type="text"/>
</div>
<!-- Brand Color Picker -->
<div class="bg-surface-container-low p-8 rounded-xl paper-card">
<label class="block text-on-surface font-bold text-lg mb-6">브랜드 대표 색상</label>
<div class="grid grid-cols-3 gap-4">
<button class="group flex flex-col items-center gap-2" data-brand-color="#ff7448" type="button">
<div class="w-20 h-20 mx-auto rounded-full bg-[#ff7448] ring-offset-4 ring-2 ring-[#ff8a7a] ring-offset-white shadow-[0_10px_18px_rgba(255,116,72,0.25)]"></div>
<span class="text-xs font-medium text-on-surface-variant">썬셋 코랄</span>
</button>
<button class="group flex flex-col items-center gap-2" data-brand-color="#ffb347" type="button">
<div class="w-20 h-20 mx-auto rounded-full bg-[#ffb347] hover:scale-105 transition-transform shadow-[0_10px_18px_rgba(255,179,71,0.22)]"></div>
<span class="text-xs font-medium text-on-surface-variant">피치 선샤인</span>
</button>
<button class="group flex flex-col items-center gap-2" data-brand-color="#70c83b" type="button">
<div class="w-20 h-20 mx-auto rounded-full bg-[#70c83b] hover:scale-105 transition-transform shadow-[0_10px_18px_rgba(112,200,59,0.20)]"></div>
<span class="text-xs font-medium text-on-surface-variant">라임 바질</span>
</button>
<button class="group flex flex-col items-center gap-2" data-brand-color="#fff4c4" type="button">
<div class="w-20 h-20 mx-auto rounded-full bg-[#fff4c4] border border-[#ffd88a]/70 hover:scale-105 transition-transform shadow-[0_10px_18px_rgba(255,216,138,0.18)]"></div>
<span class="text-xs font-medium text-on-surface-variant">버터 크림</span>
</button>
<button class="group flex flex-col items-center gap-2" data-brand-color="#8f66ff" type="button">
<div class="w-20 h-20 mx-auto rounded-full bg-[#8f66ff] hover:scale-105 transition-transform shadow-[0_10px_18px_rgba(143,102,255,0.20)]"></div>
<span class="text-xs font-medium text-on-surface-variant">베리 바이올렛</span>
</button>
<button class="group flex flex-col items-center gap-2" id="brand-color-custom-trigger" type="button">
<div class="w-20 h-20 mx-auto rounded-full flex items-center justify-center hover:scale-105 transition-transform bg-[linear-gradient(135deg,#ff8a00,#ff5f6d,#b66dff)] shadow-[0_10px_18px_rgba(255,106,136,0.22)]">
<span class="material-symbols-outlined text-white" data-icon="add">add</span>
</div>
<span class="text-xs font-medium text-on-surface-variant">직접 선택</span>
</button>
</div>
<input class="sr-only" id="brand-color-custom-input" type="color" value="#ff7448"/>
</div>
<!-- Brand Vibe Tags -->
<div class="bg-surface-container-low p-8 rounded-xl flex flex-col paper-card">
<label class="block text-on-surface font-bold text-lg mb-6">브랜드 분위기</label>
<div class="flex flex-wrap gap-3">
<button aria-pressed="false" class="px-5 py-2.5 rounded-full bg-[rgba(255,116,72,0.15)] text-[#d95c39] font-medium text-sm transition-all active:scale-95" data-mood-chip="친근한" type="button">#친근한</button>
<button aria-pressed="false" class="px-5 py-2.5 rounded-full bg-[rgba(255,179,71,0.14)] text-on-surface-variant font-medium text-sm hover:bg-[rgba(255,179,71,0.22)] transition-all active:scale-95" data-mood-chip="세련된" type="button">#세련된</button>
<button aria-pressed="false" class="px-5 py-2.5 rounded-full bg-[rgba(112,200,59,0.12)] text-on-surface-variant font-medium text-sm hover:bg-[rgba(112,200,59,0.20)] transition-all active:scale-95" data-mood-chip="자연친화적" type="button">#자연친화적</button>
<button aria-pressed="false" class="px-5 py-2.5 rounded-full bg-[rgba(143,102,255,0.10)] text-on-surface-variant font-medium text-sm hover:bg-[rgba(143,102,255,0.18)] transition-all active:scale-95" data-mood-chip="조용한" type="button">#조용한</button>
<button aria-pressed="false" class="px-5 py-2.5 rounded-full bg-[rgba(255,106,136,0.10)] text-on-surface-variant font-medium text-sm hover:bg-[rgba(255,106,136,0.18)] transition-all active:scale-95" data-mood-chip="수제제작" type="button">#수제제작</button>
<button aria-pressed="false" class="px-5 py-2.5 rounded-full bg-[rgba(255,244,196,0.95)] text-on-surface-variant font-medium text-sm hover:bg-[rgba(255,236,171,1)] transition-all active:scale-95" data-mood-chip="미니멀" type="button">#미니멀</button>
</div>
<div class="mt-6 space-y-3">
<label class="block text-sm font-semibold text-on-surface-variant">직접 입력</label>
<div class="relative">
<input class="w-full border-none rounded-xl px-5 py-4 text-base text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/30 transition-all outline-none bg-[linear-gradient(135deg,rgba(255,179,71,0.12),rgba(255,106,136,0.06))]" id="brand-atmosphere-input" placeholder="예: 포근한, 필름 감성, 동네 사랑방 같은 분위기" type="text"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline-variant" data-icon="edit">edit</span>
</div>
<p class="text-xs leading-relaxed text-on-surface-variant">원하는 분위기를 자유롭게 적으면 이후 브랜드 설명과 광고 톤에 함께 반영됩니다.</p>
</div>
</div>
<!-- Logo Upload Card -->
<div class="md:col-span-2 flex flex-col md:flex-row gap-8 items-center bg-surface p-8 rounded-xl custom-upload-dash paper-card">
<div class="w-24 h-24 bg-surface-container-high rounded-full flex items-center justify-center shrink-0 overflow-hidden" id="brand-logo-preview-wrap">
<span class="material-symbols-outlined text-3xl text-outline-variant" data-icon="cloud_upload" id="brand-logo-placeholder">cloud_upload</span>
<img alt="로고 미리보기" class="hidden w-full h-full object-contain" id="brand-logo-preview"/>
</div>
<div class="text-center md:text-left flex-grow">
<h4 class="text-on-surface font-bold mb-1">로고 업로드 (선택)</h4>
<p class="text-on-surface-variant text-sm">PNG, JPG 파일을 5MB 이내로 올려주세요.</p>
</div>
<div class="flex flex-col items-end gap-2">
<button class="px-8 py-3 bg-secondary-container text-on-secondary-container font-bold rounded-full hover:bg-secondary-fixed-dim transition-colors active:scale-95" id="brand-logo-trigger" type="button">파일 찾기</button>
<p class="text-xs text-on-surface-variant" id="brand-logo-name">아직 선택된 로고가 없어요.</p>
</div>
<input accept="image/*" class="hidden" id="brand-logo-input" type="file"/>
</div>
</div>
</main>
<!-- Fixed Bottom Action Bar -->
<footer class="fixed bottom-0 left-0 w-full bg-surface/80 backdrop-blur-xl px-8 pb-10 pt-6 z-50">
<div class="max-w-2xl mx-auto flex justify-between items-center">
<button class="text-on-surface-variant font-bold px-6 py-4 hover:bg-surface-container-high rounded-full transition-all" id="step1-prev" type="button">이전으로</button>
<button class="bg-primary text-on-primary px-12 py-4 rounded-full font-bold text-lg shadow-lg hover:shadow-primary/20 hover:brightness-110 active:scale-95 transition-all flex items-center gap-2 warm-button" id="step1-next" type="button">
<span>다음</span>
<span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</footer>
<script src="../shared.js"></script>
</body></html>
