<html lang="ko"><head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ff6b57">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Brewgram - 시작하기</title>
    <link rel="manifest" href="/stitch/manifest.webmanifest">
    <link rel="icon" href="/stitch/icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/stitch/icons/apple-touch-icon.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;display=swap">
    <link rel="stylesheet" href="./shared.css">
  </head>
  <body data-stitch-page="welcome">
    <main class="welcome-shell">
      <section class="welcome-card">
        <div class="welcome-mark">
          <img class="brand-mark brand-mark--xl" src="./brand-badge.png" alt="Brewgram 로고">
        </div>
        <p class="welcome-eyebrow">welcome to brewgram</p>
        <h1 class="welcome-title" id="welcome-title">나만의 인스타 비서를 불러볼까요?</h1>
        

        <div class="welcome-points">
          <div class="welcome-point">
            <span class="material-symbols-outlined">storefront</span>
            브랜드 이름과 분위기 설정
          </div>
          <div class="welcome-point">
            <span class="material-symbols-outlined">imagesmode</span>
            참고할 스타일의 인스타 추가
          </div>
          <div class="welcome-point">
            <span class="material-symbols-outlined">link</span>
            인스타 계정 연결은 마지막에
          </div>
        </div>

        <button class="welcome-button" id="welcome-start" type="button">
          시작하기
          <span class="material-symbols-outlined">arrow_forward</span>
        </button>

        <div class="hidden" id="welcome-status"></div>
      </section>
    </main>
    <script src="./shared.js"></script>
  

</body></html>
