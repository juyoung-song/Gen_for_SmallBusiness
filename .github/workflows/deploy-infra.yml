name: Deploy Infra

on:
  push:
    branches:
      - merge/dev

concurrency:
  group: deploy-infra
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on VM
        run: |
          ssh "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}" '/usr/local/bin/deploy-brewgram.sh'
